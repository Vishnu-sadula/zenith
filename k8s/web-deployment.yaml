apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - env:
            - name: MONGO_URI
              value: mongodb://mongo:27017/
            - name: PORT
              value: '8000'
          image: vishnusai1/web:latest
          imagePullPolicy: Always
          name: web
          ports:
            - containerPort: 8000
              protocol: TCP
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: web
  labels:
    app: web
spec:
  ports:
    - name: '8000'
      port: 8000
      targetPort: 8000
  selector:
    app: web
